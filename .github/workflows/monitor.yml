name: Production Monitor

on:
  schedule:
    - cron: '*/60 * * * *'  # Every 60 minutes
  workflow_dispatch:         # Manual trigger
    inputs:
      force_resolved_email:
        description: 'Send a test "all clear" resolution email (verifies the notification path)'
        type: boolean
        default: false
  push:
    branches: [master]

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Clear shared OTP test inbox (keeps IMAP search fast -> prevents run timeouts)
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import imaplib, ssl, os
          ctx = ssl._create_unverified_context()
          m = imaplib.IMAP4_SSL(os.environ['IMAP_HOST'], int(os.environ.get('IMAP_PORT') or 993), ssl_context=ctx)
          m.login(os.environ['IMAP_USER'], os.environ['IMAP_PASS'])
          m.select('INBOX')
          ids = m.search(None, 'ALL')[1][0].split()
          if ids:
              m.store(b','.join(ids), '+FLAGS', '\\Deleted'); m.expunge()
          print(f'cleared {len(ids)} messages from the shared OTP test inbox')
          m.logout()
          PY
        env:
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}

      - name: Run production monitor
        run: npx playwright test --project=chromium
        env:
          # BackOffice
          BACKOFFICE_URL: https://backoffice.predivo.ch
          BACKOFFICE_SUPABASE_URL: ${{ secrets.BACKOFFICE_SUPABASE_URL }}
          BACKOFFICE_SERVICE_ROLE_KEY: ${{ secrets.BACKOFFICE_SERVICE_ROLE_KEY }}
          BACKOFFICE_ANON_KEY: ${{ secrets.BACKOFFICE_ANON_KEY }}
          BACKOFFICE_SUPABASE_ACCESS_TOKEN: ${{ secrets.BACKOFFICE_SUPABASE_ACCESS_TOKEN }}
          # ScoutCopilot
          SCOUTCOPILOT_URL: https://scoutcopilot.com
          SCOUTCOPILOT_SUPABASE_URL: ${{ secrets.SCOUTCOPILOT_SUPABASE_URL }}
          SCOUTCOPILOT_SERVICE_ROLE_KEY: ${{ secrets.SCOUTCOPILOT_SERVICE_ROLE_KEY }}
          SCOUTCOPILOT_ANON_KEY: ${{ secrets.SCOUTCOPILOT_ANON_KEY }}
          # ChannelMover
          YTMIGRATION_URL: https://channelmover.com
          YTMIGRATION_SUPABASE_URL: ${{ secrets.YTMIGRATION_SUPABASE_URL }}
          YTMIGRATION_SERVICE_ROLE_KEY: ${{ secrets.YTMIGRATION_SERVICE_ROLE_KEY }}
          YTMIGRATION_ANON_KEY: ${{ secrets.YTMIGRATION_ANON_KEY }}
          YTMIGRATION_SUPABASE_ACCESS_TOKEN: ${{ secrets.YTMIGRATION_SUPABASE_ACCESS_TOKEN }}
          # ReplyFlow
          REPLYFLOW_URL: https://replyflow.help
          REPLYFLOW_SUPABASE_URL: ${{ secrets.REPLYFLOW_SUPABASE_URL }}
          REPLYFLOW_SERVICE_ROLE_KEY: ${{ secrets.REPLYFLOW_SERVICE_ROLE_KEY }}
          REPLYFLOW_ANON_KEY: ${{ secrets.REPLYFLOW_ANON_KEY }}
          REPLYFLOW_SUPABASE_ACCESS_TOKEN: ${{ secrets.REPLYFLOW_SUPABASE_ACCESS_TOKEN }}
          # ShipSolo
          SHIPSOLO_URL: https://distributionos.predivo.ch
          SHIPSOLO_SUPABASE_URL: ${{ secrets.SHIPSOLO_SUPABASE_URL }}
          SHIPSOLO_SERVICE_ROLE_KEY: ${{ secrets.SHIPSOLO_SERVICE_ROLE_KEY }}
          SHIPSOLO_ANON_KEY: ${{ secrets.SHIPSOLO_ANON_KEY }}
          # Arivioo
          ARIVIOO_URL: https://arivioo.com
          ARIVIOO_SUPABASE_URL: ${{ secrets.ARIVIOO_SUPABASE_URL }}
          ARIVIOO_SERVICE_ROLE_KEY: ${{ secrets.ARIVIOO_SERVICE_ROLE_KEY }}
          ARIVIOO_ANON_KEY: ${{ secrets.ARIVIOO_ANON_KEY }}
          # LaunchReady
          LAUNCHREADY_URL: https://launchready.predivo.ch
          LAUNCHREADY_SUPABASE_URL: ${{ secrets.LAUNCHREADY_SUPABASE_URL }}
          LAUNCHREADY_SERVICE_ROLE_KEY: ${{ secrets.LAUNCHREADY_SERVICE_ROLE_KEY }}
          LAUNCHREADY_ANON_KEY: ${{ secrets.LAUNCHREADY_ANON_KEY }}
          # SignalScore
          SIGNALSCORE_URL: https://signalscore.ch
          SIGNALSCORE_SUPABASE_URL: ${{ secrets.SIGNALSCORE_SUPABASE_URL }}
          SIGNALSCORE_SERVICE_ROLE_KEY: ${{ secrets.SIGNALSCORE_SERVICE_ROLE_KEY }}
          SIGNALSCORE_ANON_KEY: ${{ secrets.SIGNALSCORE_ANON_KEY }}
          SIGNALSCORE_SUPABASE_ACCESS_TOKEN: ${{ secrets.SIGNALSCORE_SUPABASE_ACCESS_TOKEN }}
          # Predivo
          PREDIVO_URL: https://predivo.ch
          # Valrano
          VALRANO_URL: https://valrano.com
          VALRANO_SUPABASE_URL: ${{ secrets.VALRANO_SUPABASE_URL }}
          VALRANO_SERVICE_ROLE_KEY: ${{ secrets.VALRANO_SERVICE_ROLE_KEY }}
          VALRANO_ANON_KEY: ${{ secrets.VALRANO_ANON_KEY }}
          VALRANO_SUPABASE_ACCESS_TOKEN: ${{ secrets.VALRANO_SUPABASE_ACCESS_TOKEN }}
          # Keep-alive only (no production site)
          JASSTOUR_SUPABASE_URL: ${{ secrets.JASSTOUR_SUPABASE_URL }}
          JASSTOUR_ANON_KEY: ${{ secrets.JASSTOUR_ANON_KEY }}
          # Staging projects (keep-alive)
          BACKOFFICE_STAGING_SUPABASE_URL: ${{ secrets.BACKOFFICE_STAGING_SUPABASE_URL }}
          BACKOFFICE_STAGING_ANON_KEY: ${{ secrets.BACKOFFICE_STAGING_ANON_KEY }}
          REPLYFLOW_STAGING_SUPABASE_URL: ${{ secrets.REPLYFLOW_STAGING_SUPABASE_URL }}
          REPLYFLOW_STAGING_ANON_KEY: ${{ secrets.REPLYFLOW_STAGING_ANON_KEY }}
          SIGNALSCORE_STAGING_SUPABASE_URL: ${{ secrets.SIGNALSCORE_STAGING_SUPABASE_URL }}
          SIGNALSCORE_STAGING_ANON_KEY: ${{ secrets.SIGNALSCORE_STAGING_ANON_KEY }}
          VALRANO_STAGING_SUPABASE_URL: ${{ secrets.VALRANO_STAGING_SUPABASE_URL }}
          VALRANO_STAGING_ANON_KEY: ${{ secrets.VALRANO_STAGING_ANON_KEY }}
          BOATBUDDY_SUPABASE_URL: ${{ secrets.BOATBUDDY_SUPABASE_URL }}
          BOATBUDDY_ANON_KEY: ${{ secrets.BOATBUDDY_ANON_KEY }}
          BOATBUDDY_STAGING_SUPABASE_URL: ${{ secrets.BOATBUDDY_STAGING_SUPABASE_URL }}
          BOATBUDDY_STAGING_ANON_KEY: ${{ secrets.BOATBUDDY_STAGING_ANON_KEY }}
          # Workflow presence check
          DASHBOARD_PAT: ${{ secrets.DASHBOARD_PAT }}
          # IMAP (for E2E OTP email reading)
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: '993'
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          OTP_TEST_EMAIL: ${{ secrets.IMAP_USER }}
          # Alert config
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: rogmueller1976@gmail.com
          # Test user
          TEST_EMAIL: healthcheck-test@predivo.ch

      - name: Auto-fix known failure patterns
        if: failure()
        run: node scripts/auto-fix.mjs || true
        env:
          GIT_AUTHOR_NAME: Production Monitor
          GIT_AUTHOR_EMAIL: noreply@predivo.ch
          GIT_COMMITTER_NAME: Production Monitor
          GIT_COMMITTER_EMAIL: noreply@predivo.ch

      - name: Auto-heal — redeploy broken sites
        if: failure()
        run: node scripts/auto-heal.mjs || true
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}

      - name: Send alert on failure
        if: failure()
        run: node scripts/send-alert.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: rogmueller1976@gmail.com
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send resolution email if previous run failed
        if: success()
        run: node scripts/send-resolved.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: rogmueller1976@gmail.com
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
          FORCE_RESOLVED_EMAIL: ${{ inputs.force_resolved_email }}

      # Dead-man's-switch: ping healthchecks.io on every successful run. If this monitor
      # ever stops firing (GitHub disables the cron on repo inactivity, runner never starts),
      # the ping stops arriving and healthchecks.io emails hello@predivo.ch after the grace
      # period. This is what would have caught the 66-day-red ScoutCopilot CI: a monitor with
      # no heartbeat fails silent.
      - name: Heartbeat (healthchecks.io dead-man's-switch)
        if: success()
        run: curl -fsS -m 10 --retry 3 https://hc-ping.com/ed11efd1-42e5-48d9-9b26-97dd6c284721 || true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
