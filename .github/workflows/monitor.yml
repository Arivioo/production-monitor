name: Production Monitor

on:
  schedule:
    - cron: '*/60 * * * *'  # Every 60 minutes
  workflow_dispatch: {}      # Manual trigger
  push:
    branches: [master]

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production monitor
        run: npx playwright test --project=chromium
        env:
          # BackOffice
          BACKOFFICE_URL: https://backoffice.predivo.ch
          BACKOFFICE_SUPABASE_URL: ${{ secrets.BACKOFFICE_SUPABASE_URL }}
          BACKOFFICE_SERVICE_ROLE_KEY: ${{ secrets.BACKOFFICE_SERVICE_ROLE_KEY }}
          BACKOFFICE_ANON_KEY: ${{ secrets.BACKOFFICE_ANON_KEY }}
          # ScoutCopilot
          SCOUTCOPILOT_URL: https://scoutcopilot.com
          SCOUTCOPILOT_SUPABASE_URL: ${{ secrets.SCOUTCOPILOT_SUPABASE_URL }}
          SCOUTCOPILOT_SERVICE_ROLE_KEY: ${{ secrets.SCOUTCOPILOT_SERVICE_ROLE_KEY }}
          SCOUTCOPILOT_ANON_KEY: ${{ secrets.SCOUTCOPILOT_ANON_KEY }}
          # YouTubeMigration
          YTMIGRATION_URL: https://ytmigration.com
          YTMIGRATION_SUPABASE_URL: ${{ secrets.YTMIGRATION_SUPABASE_URL }}
          YTMIGRATION_SERVICE_ROLE_KEY: ${{ secrets.YTMIGRATION_SERVICE_ROLE_KEY }}
          YTMIGRATION_ANON_KEY: ${{ secrets.YTMIGRATION_ANON_KEY }}
          # ReplyFlow
          REPLYFLOW_URL: https://replyflow.help
          REPLYFLOW_SUPABASE_URL: ${{ secrets.REPLYFLOW_SUPABASE_URL }}
          REPLYFLOW_SERVICE_ROLE_KEY: ${{ secrets.REPLYFLOW_SERVICE_ROLE_KEY }}
          REPLYFLOW_ANON_KEY: ${{ secrets.REPLYFLOW_ANON_KEY }}
          # ShipSolo
          SHIPSOLO_URL: https://distributionos.predivo.ch
          SHIPSOLO_SUPABASE_URL: ${{ secrets.SHIPSOLO_SUPABASE_URL }}
          SHIPSOLO_SERVICE_ROLE_KEY: ${{ secrets.SHIPSOLO_SERVICE_ROLE_KEY }}
          SHIPSOLO_ANON_KEY: ${{ secrets.SHIPSOLO_ANON_KEY }}
          # BelegPilot
          BELEGPILOT_URL: https://belegpilot.predivo.ch
          BELEGPILOT_SUPABASE_URL: ${{ secrets.BELEGPILOT_SUPABASE_URL }}
          BELEGPILOT_SERVICE_ROLE_KEY: ${{ secrets.BELEGPILOT_SERVICE_ROLE_KEY }}
          BELEGPILOT_ANON_KEY: ${{ secrets.BELEGPILOT_ANON_KEY }}
          # Arivioo
          ARIVIOO_URL: https://arivioo.com
          ARIVIOO_SUPABASE_URL: ${{ secrets.ARIVIOO_SUPABASE_URL }}
          ARIVIOO_SERVICE_ROLE_KEY: ${{ secrets.ARIVIOO_SERVICE_ROLE_KEY }}
          ARIVIOO_ANON_KEY: ${{ secrets.ARIVIOO_ANON_KEY }}
          # LaunchReady
          LAUNCHREADY_URL: https://launchready.predivo.ch
          LAUNCHREADY_SUPABASE_URL: ${{ secrets.LAUNCHREADY_SUPABASE_URL }}
          LAUNCHREADY_SERVICE_ROLE_KEY: ${{ secrets.LAUNCHREADY_SERVICE_ROLE_KEY }}
          LAUNCHREADY_ANON_KEY: ${{ secrets.LAUNCHREADY_ANON_KEY }}
          # SignalScore
          SIGNALSCORE_URL: https://signalscore.ch
          SIGNALSCORE_SUPABASE_URL: ${{ secrets.SIGNALSCORE_SUPABASE_URL }}
          SIGNALSCORE_SERVICE_ROLE_KEY: ${{ secrets.SIGNALSCORE_SERVICE_ROLE_KEY }}
          SIGNALSCORE_ANON_KEY: ${{ secrets.SIGNALSCORE_ANON_KEY }}
          # Predivo
          PREDIVO_URL: https://predivo.ch
          # BenchmarkSignal
          BENCHMARKSIGNAL_URL: https://benchmarksignal.predivo.ch
          # APIs (predivo.ch)
          APIS_URL: https://predivo.ch
          APIS_SUPABASE_URL: ${{ secrets.APIS_SUPABASE_URL }}
          APIS_SERVICE_ROLE_KEY: ${{ secrets.APIS_SERVICE_ROLE_KEY }}
          APIS_ANON_KEY: ${{ secrets.APIS_ANON_KEY }}
          # Keep-alive only (no production site)
          JASSTOUR_SUPABASE_URL: ${{ secrets.JASSTOUR_SUPABASE_URL }}
          JASSTOUR_ANON_KEY: ${{ secrets.JASSTOUR_ANON_KEY }}
          CRYPTOTRADING_SUPABASE_URL: ${{ secrets.CRYPTOTRADING_SUPABASE_URL }}
          CRYPTOTRADING_ANON_KEY: ${{ secrets.CRYPTOTRADING_ANON_KEY }}
          SIGNALFORGE_SUPABASE_URL: ${{ secrets.SIGNALFORGE_SUPABASE_URL }}
          SIGNALFORGE_ANON_KEY: ${{ secrets.SIGNALFORGE_ANON_KEY }}
          # IMAP (for E2E OTP email reading)
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: '993'
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          OTP_TEST_EMAIL: ${{ secrets.IMAP_USER }}
          # Alert config
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: roger@mueller.ro
          # Test user
          TEST_EMAIL: healthcheck-test@predivo.ch

      - name: Auto-fix known failure patterns
        if: failure()
        run: node scripts/auto-fix.mjs || true
        env:
          GIT_AUTHOR_NAME: Production Monitor
          GIT_AUTHOR_EMAIL: noreply@predivo.ch
          GIT_COMMITTER_NAME: Production Monitor
          GIT_COMMITTER_EMAIL: noreply@predivo.ch

      - name: Auto-heal — redeploy broken sites
        if: failure()
        run: node scripts/auto-heal.mjs || true
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}

      - name: Send alert on failure
        if: failure()
        run: node scripts/send-alert.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: roger@mueller.ro
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send resolution email if previous run failed
        if: success()
        run: node scripts/send-resolved.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: roger@mueller.ro
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
