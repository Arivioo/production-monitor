name: Daily Dashboard Update

on:
  schedule:
    # Every day at 21:00 UTC (23:00 CET / 22:00 CEST)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Update project dashboard data
        run: bash scripts/update-dashboard.sh
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}

      - name: Send alert on failure
        if: failure()
        run: node scripts/send-alert.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: rogmueller1976@gmail.com
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # Collects per-workflow GitHub Actions status across all repos → automation-status.json
  # (consumed by the BackOffice "Wie wir arbeiten" handbook) and emails if any workflow
  # has been red for >48h. Separate job so it runs even if the dashboard update fails.
  automation-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Collect automation status
        id: collect
        run: node scripts/automation-status.mjs
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}

      # Always runs after collection; the script emails only when escalations exist
      # (red >48h) and exits 0 otherwise, so this never fails the job.
      - name: Escalate workflows red for >48h
        if: always() && steps.collect.outcome == 'success'
        run: node scripts/send-automation-alert.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: rogmueller1976@gmail.com

      # Emails when previously-escalated workflows are green again (diff computed by
      # automation-status.mjs against the previously published report). Sends only
      # when /tmp/automation-resolved.json is non-empty.
      - name: Notify resolved escalations
        if: always() && steps.collect.outcome == 'success'
        run: node scripts/send-automation-resolved.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: rogmueller1976@gmail.com
