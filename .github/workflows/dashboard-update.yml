name: Daily Dashboard Update

on:
  schedule:
    # Every day at 21:00 UTC (23:00 CET / 22:00 CEST)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Update project dashboard data
        run: bash scripts/update-dashboard.sh
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}

      - name: Send alert on failure
        if: failure()
        run: node scripts/send-alert.mjs
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: roger@mueller.ro
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
