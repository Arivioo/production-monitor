name: Daily Dashboard Update

on:
  schedule:
    # Every day at 21:00 UTC (23:00 CET / 22:00 CEST)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Update project dashboard data
        run: bash scripts/update-dashboard.sh
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
