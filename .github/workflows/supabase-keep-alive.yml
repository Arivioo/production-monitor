name: Supabase Keep-Alive (All Projects)

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping all Supabase projects
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping all projects
        run: |
          declare -A PROJECTS=(
            ["Valrano"]="https://mkdeftmubrkseyrrbzvp.supabase.co|sb_publishable_z3rlat9q1JtLO65f5ESpLg_rN2MOi1x"
            ["ChannelMover"]="https://qswluvqunswggfmesdcs.supabase.co|${{ secrets.YTMIGRATION_ANON_KEY }}"
            ["ReplyFlow"]="https://dqmhsdzldkxngwjrxois.supabase.co|${{ secrets.REPLYFLOW_ANON_KEY }}"
            ["ReplyFlowStaging"]="https://cuvqzwvyovxvvvuddtjd.supabase.co|sb_publishable_yFX-Cd6KledrN4s98vgthw_R2z_n2vo"
            ["BackOffice"]="https://xoecpzfsskalvjrtcbbl.supabase.co|sb_publishable_-hG97-xSmiEetdowiPpmdQ_lhV4h5TZ"
            ["SignalScore"]="https://ogdpgufptemcgyszmjek.supabase.co|${{ secrets.SIGNALSCORE_ANON_KEY }}"
            ["ScoutCopilot"]="https://rlcsuqwqzoqjykdiqjye.supabase.co|sb_publishable_OJIxBF49Tis6_-nsUSQDQg_IOckCy2S"
            ["LaunchReady"]="https://hcfeoescybfngjsphekq.supabase.co|sb_publishable_FW4tiXgcCw2RYCtLDcHqag_lxq6Aco4"
            ["DistributionOS"]="https://jxjpbmkgmuunpayqgbsx.supabase.co|sb_publishable_8Q_iepRvUKjASo9_3RagaA_q7uaSCMr"
            # Arivioo — PAUSED (Supabase project inactive, excluded from keep-alive)
            # BelegPilot + SignalForgeAI — SUNSET 2026-07-02 (projects decommissioned)
            ["JassTourUIKit"]="https://dkxdlovwzsxnepoteebk.supabase.co|sb_publishable_9RAQoEYJz6TuSOW9Z5E52g_vd7EmU1a"
            ["ValranoStaging"]="https://vfwpcgdkrwqhdivfzmrg.supabase.co|sb_publishable_vA9cXoaDFmwrL0GV4uVLqg_iWaKyc0s"
            # APIs — SUNSET 2026-07-02 (API Dashboard decommissioned)
          )

          FAILED=0
          for name in "${!PROJECTS[@]}"; do
            IFS='|' read -r url key <<< "${PROJECTS[$name]}"
            if curl -sf -X POST "${url}/graphql/v1" \
              -H "Content-Type: application/json" \
              -H "apikey: ${key}" \
              -H "Authorization: Bearer ${key}" \
              -d '{"query":"{ __typename }"}' > /dev/null 2>&1; then
              echo "OK: ${name}"
            else
              echo "FAIL: ${name}"
              FAILED=$((FAILED + 1))
            fi
          done

          if [ "$FAILED" -gt 0 ]; then
            # Fail the job (not just warn) so a broken ping is VISIBLE and the monitor
            # alert fires — a silent "green" here let ChannelMover's ping fail unnoticed.
            echo "::error::${FAILED} project(s) failed keep-alive ping — a project may pause"
            exit 1
          fi
