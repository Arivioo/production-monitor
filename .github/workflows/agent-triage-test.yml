name: Agent-Triage Smoke Test

# Manual DRY-RUN validation of the Phase-2 agent-triage tier. Feeds a synthetic escalation to
# scripts/agent-triage.mjs and confirms the headless Claude agent authenticates (dedicated
# workspace key), investigates the live site + repo, and writes a verdict — with NO write action
# (read-only tools + dry-run policy). Use it to prove the agent out before/while trusting it on
# real incidents. Costs one small Opus run against the $25/mo-capped Production Monitor workspace.

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write synthetic escalation (flaky timeout on a healthy site)
        run: |
          node -e 'require("fs").writeFileSync("auto-fix-results.json", JSON.stringify({fixes:[],escalations:[{project:"ReplyFlow",test:"homepage loads without console errors",error:"Test timeout of 30000ms exceeded.\nError: page.waitForLoadState: Target page, context or browser has been closed",file:"tests/replyflow/production-monitor.spec.ts",line:42,reason:"No matching auto-fix pattern"}],timestamp:"2026-07-17T12:00:00Z"},null,2))'
          echo "--- synthetic escalation ---"; cat auto-fix-results.json

      - name: Run agent-triage (DRY RUN — no writes)
        run: node scripts/agent-triage.mjs
        env:
          AGENT_TRIAGE_ENABLED: '1'
          AGENT_TRIAGE_DRY_RUN: '1'
          ANTHROPIC_API_KEY: ${{ secrets.AGENT_TRIAGE_API_KEY }}
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}

      - name: Show verdict
        if: always()
        run: |
          echo "=== triage-results.json ==="; cat triage-results.json 2>/dev/null || echo "(no results file)"
          echo "=== triage-verdict.json ==="; cat triage-verdict.json 2>/dev/null || echo "(no verdict file)"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: triage-verdict
          path: |
            triage-results.json
            triage-verdict.json
          retention-days: 7
